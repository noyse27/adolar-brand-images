<!doctype html><html lang="de"><head><meta charset="utf-8"><title>Adolar MZ-1 Animation Lab</title><meta name="viewport" content="width=device-width, initial-scale=1"><style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#070D22;color:#D9CCFF;font-family:system-ui,sans-serif}main{width:min(760px,92vw);text-align:center}object{width:min(260px,62vw);height:auto}.controls{display:flex;flex-wrap:wrap;justify-content:center;gap:.75rem;margin-top:1.5rem}button{border:0;border-radius:999px;padding:.7rem 1rem;background:#D9CCFF;color:#070D22;font:inherit;cursor:pointer}</style></head><body><main><h1>MZ-1 Animation Lab</h1><object id="rocket-object" data="../../animations/rocket-mz1-state-machine.svg" type="image/svg+xml"></object><p id="state-label">idle</p><div class="controls"><button data-state="idle">Idle</button><button data-state="loading">Loading</button><button data-state="playing">Playing</button><button data-state="paused">Paused</button><button data-state="error">Error</button><button data-state="success">Success</button></div></main><script>const object=document.querySelector("#rocket-object");const label=document.querySelector("#state-label");function setState(state){label.textContent=state;const svg=object.contentDocument?.querySelector("svg");if(svg)svg.dataset.state=state}object.addEventListener("load",()=>setState("idle"));document.querySelectorAll("button[data-state]").forEach((button)=>{button.addEventListener("click",()=>setState(button.dataset.state))});</script></body></html>
