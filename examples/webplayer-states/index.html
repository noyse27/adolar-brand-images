<!doctype html><html lang="de"><head><meta charset="utf-8"><title>Adolar Webplayer State Example</title><meta name="viewport" content="width=device-width, initial-scale=1"><style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#070D22;color:#D9CCFF;font-family:system-ui,sans-serif}main{width:min(720px,92vw);text-align:center;padding:2rem;border:1px solid rgba(217,204,255,.18);border-radius:24px;background:rgba(255,255,255,.04)}object{width:148px;height:148px}audio{width:min(100%,520px);margin-top:1rem}</style></head><body><main><h1>Adolar Webplayer State Example</h1><object id="rocket-object" data="../../animations/rocket-mz1-state-machine.svg" type="image/svg+xml"></object><p id="state-label">Status: idle</p><audio id="audio" controls></audio><p>Dieses Beispiel zeigt nur die State-Verknüpfung. Setze im echten Player die Stream-URL wie gewohnt.</p></main><script type="module">import{setAdolarMZ1State,bindAdolarMZ1ToAudio}from"../../web/adolar-mz1-state-helper.js";const object=document.querySelector("#rocket-object");const audio=document.querySelector("#audio");const label=document.querySelector("#state-label");object.addEventListener("load",()=>{const svg=object.contentDocument?.querySelector("svg");function setState(state){setAdolarMZ1State(svg,state);label.textContent=`Status: ${state}`}bindAdolarMZ1ToAudio(audio,svg);setState("idle");audio.addEventListener("loadstart",()=>label.textContent="Status: loading");audio.addEventListener("waiting",()=>label.textContent="Status: loading");audio.addEventListener("playing",()=>label.textContent="Status: playing");audio.addEventListener("pause",()=>label.textContent="Status: paused");audio.addEventListener("ended",()=>label.textContent="Status: idle");audio.addEventListener("error",()=>label.textContent="Status: error")});</script></body></html>
