name: Build Brand Exports

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Check assets
        run: npm run check

      - name: Build exports
        run: npm run build

      - name: Upload generated exports
        uses: actions/upload-artifact@v4
        with:
          name: adolar-brand-generated-exports
          path: |
            exports/
            favicons/
            social/**/*.png
