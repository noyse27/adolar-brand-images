<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Adolar TV App Icon</title>
  <desc id="desc">Square app icon using the shared MZ-1 rocket mark.</desc>
  <defs>
    <style>
    :root {
      --adolar-violet-dark: #4F2EC8;
      --adolar-violet: #6E44FF;
      --adolar-lavender: #A98BFF;
      --adolar-lavender-light: #D9CCFF;
      --adolar-cyan: #31D5FF;
      --adolar-navy: #15113D;
      --adolar-orange: #FF9500;
      --adolar-yellow: #FFD35A;
      --adolar-white: #FFFFFF;
      --accent: #31D5FF;
    }
    .wordmark {
      font-family: "Orbitron", "Orbitron Medium", "Orbitron Regular", "Segoe UI", sans-serif;
      font-weight: 700;
      letter-spacing: 0.045em;
      fill: var(--adolar-violet-dark);
    }
    .submark {
      font-family: "Orbitron", "Orbitron Medium", "Orbitron Regular", "Segoe UI", sans-serif;
      font-weight: 600;
      letter-spacing: 0.08em;
      fill: var(--accent);
    }
    .body { fill: var(--adolar-lavender); }
    .nose, .fin, .engine { fill: var(--adolar-violet); }
    .body-highlight { fill: var(--adolar-lavender-light); opacity: .48; }
    .cockpit-ring { fill: var(--adolar-white); }
    .cockpit { fill: var(--adolar-navy); }
    .cockpit-reflection {
      fill: none;
      stroke: var(--accent);
      stroke-width: 9;
      stroke-linecap: round;
    }
    .cockpit-dot { fill: var(--accent); }
    .flame-outer { fill: var(--adolar-orange); }
    .flame-inner { fill: var(--adolar-yellow); }
    .mz-label {
      font-family: "Orbitron", "Segoe UI", sans-serif;
      font-size: 24px;
      font-weight: 700;
      fill: var(--adolar-violet);
      opacity: .58;
    }
    .cockpit-symbol {
      font-family: "Orbitron", "Segoe UI Symbol", "Segoe UI", sans-serif;
      font-size: 34px;
      font-weight: 700;
      text-anchor: middle;
      dominant-baseline: central;
      fill: var(--accent);
    }

    </style>
  </defs>
  <rect width="512" height="512" rx="112" fill="#F7F4FF"/>
  <g transform="translate(86 58) scale(1.12)">
  <g id="rocket-mz1" transform="translate(0 0) rotate(-24 140 140)" style="--accent:#FF4D6D">
    <path class="flame-outer" d="M126 278 C100 312 105 350 136 372 C167 350 172 312 146 278 Z"/>
    <path class="flame-inner" d="M132 287 C118 308 121 331 138 345 C154 331 157 308 143 287 Z"/>
    <rect x="95" y="243" width="90" height="34" rx="17" class="engine"/>
    <path class="fin" d="M62 190 C30 200 14 232 20 260 C47 253 73 239 94 216 Z"/>
    <path class="fin" d="M188 216 C210 239 235 253 262 260 C268 232 252 200 220 190 Z"/>
    <path class="body" d="M140 8 C91 55 58 127 58 197 C58 247 94 285 140 285 C186 285 222 247 222 197 C222 127 189 55 140 8 Z"/>
    <path class="nose" d="M140 8 C116 31 96 61 82 93 C119 116 161 116 198 93 C184 61 164 31 140 8 Z"/>
    <path class="body-highlight" d="M92 93 C78 126 70 162 70 197 C70 230 87 256 113 269 C103 223 107 155 136 46 C119 58 104 74 92 93 Z"/>
    <circle cx="140" cy="145" r="45" class="cockpit-ring"/>
    <circle cx="140" cy="145" r="35" class="cockpit"/>
    <path class="cockpit-reflection" d="M119 143 C119 129 131 117 145 117"/>
    <circle cx="157" cy="163" r="7" class="cockpit-dot"/>
    <text x="140" y="148" class="cockpit-symbol">▶</text>
    <text x="94" y="226" transform="rotate(18 94 226)" class="mz-label">MZ-1</text>
  </g>

  </g>
</svg>
