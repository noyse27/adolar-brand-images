<svg class="adolar-mz1" data-state="idle" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 380" role="img" aria-labelledby="title desc">
  <title id="title">Adolar MZ-1 Animated Rocket</title>
  <desc id="desc">CSS animated MZ-1 rocket with idle, loading, playing, paused, error and success states.</desc>
  <defs><style>
    :root {
      --adolar-violet-dark: #4F2EC8;
      --adolar-violet: #6E44FF;
      --adolar-lavender: #A98BFF;
      --adolar-lavender-light: #D9CCFF;
      --adolar-cyan: #31D5FF;
      --adolar-navy: #15113D;
      --adolar-orange: #FF9500;
      --adolar-yellow: #FFD35A;
      --adolar-white: #FFFFFF;
      --adolar-error: #FF4D6D;
      --adolar-success: #7CFFB2;
      --accent: #31D5FF;
    }
    .body { fill: var(--adolar-lavender); }
    .nose, .fin, .engine { fill: var(--adolar-violet); }
    .body-highlight { fill: var(--adolar-lavender-light); opacity: .48; }
    .cockpit-ring { fill: var(--adolar-white); }
    .cockpit { fill: var(--adolar-navy); }
    .cockpit-reflection { fill: none; stroke: var(--accent); stroke-width: 9; stroke-linecap: round; }
    .cockpit-dot { fill: var(--accent); }
    .flame-outer { fill: var(--adolar-orange); }
    .flame-inner { fill: var(--adolar-yellow); }
    .mz-label { font-family: "Orbitron", "Segoe UI", sans-serif; font-size: 24px; font-weight: 700; fill: var(--adolar-violet); opacity: .58; }
    #rocket-mz1 { transform-origin: 150px 170px; animation: mz1-idle 3.4s ease-in-out infinite; }
    .flame-outer, .flame-inner { transform-origin: 136px 278px; }
    svg[data-state="idle"] #rocket-mz1 { animation: mz1-idle 3.4s ease-in-out infinite; }
    svg[data-state="loading"] #rocket-mz1 { animation: mz1-idle 2.8s ease-in-out infinite; }
    svg[data-state="loading"] .flame-outer, svg[data-state="loading"] .flame-inner { animation: mz1-flame-pulse 900ms ease-in-out infinite; }
    svg[data-state="playing"] #rocket-mz1 { animation: mz1-playing 1.8s ease-in-out infinite; }
    svg[data-state="playing"] .flame-outer, svg[data-state="playing"] .flame-inner { animation: mz1-flame-pulse 520ms ease-in-out infinite; }
    svg[data-state="paused"] #rocket-mz1 { animation: mz1-idle 5s ease-in-out infinite; }
    svg[data-state="paused"] .flame-outer, svg[data-state="paused"] .flame-inner { opacity: .18; transform: scaleY(.62); }
    svg[data-state="error"] #rocket-mz1 { animation: mz1-error 420ms ease-out 1 both; }
    svg[data-state="error"] .flame-outer, svg[data-state="error"] .flame-inner { opacity: .08; transform: scaleY(.45); }
    svg[data-state="error"] .cockpit-reflection { stroke: var(--adolar-error); }
    svg[data-state="error"] .cockpit-dot { fill: var(--adolar-error); }
    svg[data-state="success"] #rocket-mz1 { animation: mz1-success 950ms cubic-bezier(.22,1,.36,1) 1 both; }
    svg[data-state="success"] .cockpit-reflection { stroke: var(--adolar-success); }
    svg[data-state="success"] .cockpit-dot { fill: var(--adolar-success); }
    svg[data-state="success"] .flame-outer, svg[data-state="success"] .flame-inner { animation: mz1-flame-boost 950ms ease-out 1 both; }
    @keyframes mz1-idle { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-7px) rotate(-.7deg); } }
    @keyframes mz1-playing { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-5px) rotate(.8deg); } }
    @keyframes mz1-flame-pulse { 0%, 100% { transform: scaleY(.82); opacity: .82; } 50% { transform: scaleY(1.18); opacity: 1; } }
    @keyframes mz1-flame-boost { 0% { transform: scaleY(.8); opacity: .75; } 35% { transform: scaleY(1.5); opacity: 1; } 100% { transform: scaleY(.88); opacity: .9; } }
    @keyframes mz1-error { 0% { transform: translate(0, 0) rotate(0deg); } 35% { transform: translate(8px, 8px) rotate(13deg); } 65% { transform: translate(6px, 11px) rotate(10deg); } 100% { transform: translate(7px, 10px) rotate(11deg); } }
    @keyframes mz1-success { 0% { transform: translateY(0) rotate(0deg); } 42% { transform: translate(12px, -22px) rotate(-5deg); } 100% { transform: translateY(0) rotate(0deg); } }
    @media (prefers-reduced-motion: reduce) { #rocket-mz1, .flame-outer, .flame-inner { animation: none !important; transition: none !important; } }
</style></defs>
  <g transform="translate(22 8)">
    <g id="rocket-mz1" transform="translate(0 0) rotate(-24 140 140)">
      <path class="flame-outer" d="M126 278 C100 312 105 350 136 372 C167 350 172 312 146 278 Z"/>
      <path class="flame-inner" d="M132 287 C118 308 121 331 138 345 C154 331 157 308 143 287 Z"/>
      <rect x="95" y="243" width="90" height="34" rx="17" class="engine"/>
      <path class="fin" d="M62 190 C30 200 14 232 20 260 C47 253 73 239 94 216 Z"/>
      <path class="fin" d="M188 216 C210 239 235 253 262 260 C268 232 252 200 220 190 Z"/>
      <path class="body" d="M140 8 C91 55 58 127 58 197 C58 247 94 285 140 285 C186 285 222 247 222 197 C222 127 189 55 140 8 Z"/>
      <path class="nose" d="M140 8 C116 31 96 61 82 93 C119 116 161 116 198 93 C184 61 164 31 140 8 Z"/>
      <path class="body-highlight" d="M92 93 C78 126 70 162 70 197 C70 230 87 256 113 269 C103 223 107 155 136 46 C119 58 104 74 92 93 Z"/>
      <circle cx="140" cy="145" r="45" class="cockpit-ring"/>
      <circle cx="140" cy="145" r="35" class="cockpit"/>
      <path class="cockpit-reflection" d="M119 143 C119 129 131 117 145 117"/>
      <circle cx="157" cy="163" r="7" class="cockpit-dot"/>
      <text x="94" y="226" transform="rotate(18 94 226)" class="mz-label">MZ-1</text>
    </g>
  </g>
</svg>
